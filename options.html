<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Mini TweetPad 設定</title>
  <style>
    body { font-family: sans-serif; padding: 16px; }
    label { display: block; margin-bottom: 8px; }
    input, select { margin-left: 8px; }
    button { margin-top: 12px; padding: 6px 12px; }
  </style>
</head>
<body>
  <h1>Mini TweetPad 設定</h1>

  <label>
    透明度（0.3〜1.0）:
    <input id="opacity" type="number" min="0.3" max="1" step="0.05">
  </label>

  <label>
    幅（px）:
    <input id="width" type="number">
  </label>

  <label>
    高さ（px）:
    <input id="height" type="number">
  </label>

  <label>
    テーマ:
    <select id="theme">
      <option value="dark">ダーク</option>
      <option value="light">ライト</option>
    </select>
  </label>

  <button id="save">保存</button>
  <span id="status" style="margin-left:8px;"></span>

  <script src="options.js"></script>
</body>
</html>
